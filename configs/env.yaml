seeds:
  map_seed: 0
  world_dyn_seed: 10

world:
  size: 400.0
  airship_pos: [200.0, 200.0]

users:
  num_users: 50
  distribution_mode: fixed_cluster_uniform
  n_clusters: 3
  cluster_ratio: 0.6
  cluster_std: 30.0
  lam: 0.5
  cold_start_dt: 60.0

uav:
  max_uavs: 6
  move_limit: 50.0
  coverage_radius: 86.6
  init_battery: 1.0

time:
  high_steps: 100
  low_steps_per_high: 10
  move_sec: 10.0
  collect_sec: 50.0

env:
  initial_serving_ids: [0, 1, 2, 3, 4, 5]

service:
  mode: full_clear

reward:
  collect_weight: 1.0
  backlog_weight: 1.0
  oob_penalty: 500.0
  oob_penalty_scale: 5.0

obs:
  include_uav_id: true
  normalize_positions: true
  normalize_last_visit: true
  last_visit_norm: 10000.0
